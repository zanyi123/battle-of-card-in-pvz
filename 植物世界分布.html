<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 14px;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        th, td {
            padding: 10px 8px;
            text-align: center;
            border: 1px solid #ddd;
            min-width: 60px;
            cursor: pointer;
            transition: all 0.2s;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }
        th:first-child, td:first-child {
            background: #f0f0f0;
            font-weight: bold;
            min-width: 100px;
        }
        tr:nth-child(even) td:nth-child(n+2) {
            background: #f9f9f9;
        }
        tr:hover td {
            background: #e8f4f8;
            transform: scale(1.02);
        }
        th:hover, td:hover {
            background: #667eea !important;
            color: white;
        }
        th.empty-cell, td.empty-cell {
            background: transparent;
            border: none;
            cursor: default;
        }
        th.empty-cell:hover, td.empty-cell:hover {
            background: transparent;
            transform: none;
        }
        .tooltip {
            position: fixed;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 300px;
            z-index: 1000;
            display: none;
            line-height: 1.6;
        }
        .tooltip h4 {
            color: #667eea;
            margin-bottom: 5px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .add-form {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .add-form h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .add-form .btn {
            width: 100%;
            margin-top: 10px;
        }
        .percentage {
            font-weight: bold;
        }
        .red { background: #ffebee; }
        .orange { background: #fff3e0; }
        .yellow { background: #fffde7; }
        .green { background: #e8f5e9; }
        .blue { background: #e3f2fd; }

        .pink { background: #fce4ec; }
        .cyan { background: #e0f7fa; }
        .gray { background: #f5f5f5; }
    </style>
</head>

            { name: "梛子加农炮", world: 18, atk: 5, faction: "射" },
            { name: "红针花", world: 18, atk: 2, faction: "射" },
            { name: "莲小蓬", world: 18, atk: 1, faction: "射" },
            { name: "小喷菇", world: 18, atk: 1, faction: "射" },
            { name: "飞镖洋蓟", world: 18, atk: 5, faction: "射" },

            { name: "全息坚果", world: 99, atk: 2, faction: "坦" },
            { name: "强酸柠檬", world: 99, atk: 3, faction: "法" },
            { name: "热辣海藻", world: 99, atk: 2, faction: "法" },
            { name: "水晶兰", world: 99, atk: 2, faction: "法" },
            { name: "双重射手", world: 99, atk: 2, faction: "射" }
        ];

        // 渲染表格1：强度分布
        function renderTable1() {
            const tbody = document.getElementById('tbody1');
            tbody.innerHTML = '';

            // 分组数据
            const groups = {
                '0': [],
                '0-2': [],
                '3-4': [],
                '>4': []
            };

            plants.forEach(plant => {
                let groupKey;
                if (plant.atk === 0) {
                    groupKey = '0';
                } else if (plant.atk <= 2) {
                    groupKey = '0-2';
                } else if (plant.atk <= 4) {
                    groupKey = '3-4';
                } else {
                    groupKey = '>4';
                }
                groups[groupKey].push(plant);
            });

            // 计算每个世界在每个ATK段的数量
            const worldData = [];
            worlds.forEach(world => {
                const rowData = {
                    name: world.name,
                    emoji: world.emoji,
                    data: {}
                };
                ['0', '0-2', '3-4', '>4'].forEach(key => {
                    rowData.data[key] = groups[key].filter(p => p.world === world.id).length;
                });
                worldData.push(rowData);
            });

            // 渲染行
            worldData.forEach(world => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td title="${world.emoji} ${world.name}">${world.name}</td>
                    <td class="${getColorClass(world.data['0'])}" data-world="${world.id}" data-group="0" onclick="showPlants(this)">${world.data['0']}</td>
                    <td class="${getColorClass(world.data['0-2'])}" data-world="${world.id}" data-group="0-2" onclick="showPlants(this)">${world.data['0-2']}</td>
                    <td class="${getColorClass(world.data['3-4'])}" data-world="${world.id}" data-group="3-4" onclick="showPlants(this)">${world.data['3-4']}</td>
                    <td class="${getColorClass(world.data['>4'])}" data-world="${world.id}" data-group=">4" onclick="showPlants(this)">${world.data['>4']}</td>
                `;
                tbody.appendChild(tr);
            });

            // 更新统计
            updateStats1();
        }

        function updateStats1() {
            const total = plants.length;
            const stat0 = plants.filter(p => p.atk === 0).length;
            const stat02 = plants.filter(p => p.atk > 0 && p.atk <= 2).length;
            const stat34 = plants.filter(p => p.atk > 2 && p.atk <= 4).length;
            const stat54 = plants.filter(p => p.atk > 4).length;

            document.getElementById('total1').textContent = total;
            document.getElementById('stat0').textContent = stat0;
            document.getElementById('stat02').textContent = stat02;
            document.getElementById('stat34').textContent = stat34;
            document.getElementById('stat54').textContent = stat54;
        }

        function getColorClass(count) {
            if (count === 0) return '';
            if (count <= 2) return 'red';
            if (count <= 4) return 'orange';
            if (count <= 6) return 'yellow';
            return 'green';
        }

        // 渲染表格2：职业分布
        function renderTable2() {
            const tbody = document.getElementById('tbody2');
            tbody.innerHTML = '';

            // 分组数据
            const groups = {
                '法': [],
                '射': [],
                '坦': [],
                '辅': []
            };

            plants.forEach(plant => {
                groups[plant.faction].push(plant);
            });

            // 计算每个世界在每个职业的数量
            const worldData = [];
            worlds.forEach(world => {
                const rowData = {
                    name: world.name,
                    emoji: world.emoji,
                    data: {}
                };
                ['法', '射', '坦', '辅'].forEach(faction => {
                    rowData.data[faction] = groups[faction].filter(p => p.world === world.id).length;
                });
                worldData.push(rowData);
            });

            // 渲染行
            worldData.forEach(world => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td title="${world.emoji} ${world.name}">${world.name}</td>
                    <td class="${getColorClass2(world.data['法'])}" data-world="${world.id}" data-faction="法" onclick="showPlants(this)">${world.data['法']}</td>
                    <td class="${getColorClass2(world.data['射'])}" data-world="${world.id}" data-faction="射" onclick="showPlants(this)">${world.data['射']}</td>
                    <td class="${getColorClass2(world.data['坦'])}" data-world="${world.id}" data-faction="坦" onclick="showPlants(this)">${world.data['坦']}</td>
                    <td class="${getColorClass2(world.data['辅'])}" data-world="${world.id}" data-faction="辅" onclick="showPlants(this)">${world.data['辅']}</td>
                `;
                tbody.appendChild(tr);
            });

            // 更新统计
            updateStats2();
        }

        function updateStats2() {
            const total = plants.length;
            const statFa = plants.filter(p => p.faction === '法').length;
            const statSh = plants.filter(p => p.faction === '射').length;
            const statTk = plants.filter(p => p.faction === '坦').length;
            const statFu = plants.filter(p => p.faction === '辅').length;

            document.getElementById('total2').textContent = total;
            document.getElementById('statFa').textContent = statFa;
            document.getElementById('statSh').textContent = statSh;
            document.getElementById('statTk').textContent = statTk;
            document.getElementById('statFu').textContent = statFu;
        }

        function getColorClass2(count) {
            if (count === 0) return '';
            if (count <= 2) return 'pink';
            if (count <= 4) return 'purple';
            if (count <= 6) return 'blue';
            return 'cyan';
        }

        // 显示植物列表
        function showPlants(element) {
            const world = element.dataset.world;
            const group = element.dataset.group || element.dataset.faction;
            const value = element.textContent;

            if (value === '0') return;

            let filteredPlants;
            if (element.dataset.group) {
                // 表1：按ATK分组
                let atkGroup;
                if (element.dataset.group === '0') atkGroup = 0;
                else if (element.dataset.group === '0-2') atkGroup = (0, 2);
                else if (element.dataset.group === '3-4') atkGroup = (3, 4);
                else if (element.dataset.group === '>4') atkGroup = (5, Infinity);

                filteredPlants = plants.filter(p =>
                    p.world === parseInt(world) &&
                    p.atk >= atkGroup[0] &&
                    p.atk <= atkGroup[1]
                );
            } else {
                // 表2：按职业分组
                filteredPlants = plants.filter(p =>
                    p.world === parseInt(world) &&
                    p.faction === group
                );
            }

            const tooltip = document.getElementById('tooltip');
            let content = '';
            filteredPlants.forEach(p => {
                const worldName = worlds.find(w => w.id === p.world).name;
                content += `<div><strong>${p.name}</strong> (${worldName}) ATK:${p.atk} ${p.faction}</div>`;
            });

            tooltip.innerHTML = `
                <h4>${worlds.find(w => w.id === parseInt(world)).emoji} ${worlds.find(w => w.id === parseInt(world)).name} - ${element.textContent}植物</h4>
                <div>${content}</div>
            `;

            tooltip.style.display = 'block';
            tooltip.style.left = element.getBoundingClientRect().left + 10 + 'px';
            tooltip.style.top = element.getBoundingClientRect().top + 50 + 'px';
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.tooltip')) {
                document.getElementById('tooltip').style.display = 'none';
            }
        });

        // 添加植物
        function addPlant() {
            const name = document.getElementById('addName').value.trim();
            const world = parseInt(document.getElementById('addWorld').value);
            const atk = parseInt(document.getElementById('addAtk').value);
            const faction = document.getElementById('addFaction').value;

            if (!name || !world || isNaN(atk) || !faction) {
                alert('请填写完整信息！');
                return;
            }

            plants.push({ name, world, atk, faction });
            renderTable1();
            renderTable2();
            saveData();

            // 清空输入
            document.getElementById('addName').value = '';
            document.getElementById('addWorld').value = '';
            document.getElementById('addAtk').value = '';
        }

        function addPlant2() {
            const name = document.getElementById('addName2').value.trim();
            const world = parseInt(document.getElementById('addWorld2').value);
            const atk = parseInt(document.getElementById('addAtk2').value);
            const faction = document.getElementById('addFaction2').value;

            if (!name || !world || isNaN(atk) || !faction) {
                alert('请填写完整信息！');
                return;
            }

            plants.push({ name, world, atk, faction });
            renderTable1();
            renderTable2();
            saveData();

            // 清空输入
            document.getElementById('addName2').value = '';
            document.getElementById('addWorld2').value = '';
            document.getElementById('addAtk2').value = '';
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('pvzPlants', JSON.stringify(plants));
        }

        // 加载数据
        function loadData() {
            const saved = localStorage.getItem('pvzPlants');
            if (saved) {
                plants = JSON.parse(saved);
            }
            renderTable1();
            renderTable2();
        }

        // 初始化
        loadData();
    </script>
</body>
